<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <style>
            *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                background: #0a0a14;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-page {
                width: 420px;
                padding: 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #13132a;
                max-width: 420px;
                margin: 0 auto;
                padding: 48px 40px;
                text-align: center;
                border-radius: 16px;
                border: 1px solid rgba(124, 58, 237, 0.2);
                box-shadow:
                    0 0 40px rgba(124, 58, 237, 0.08),
                    0 20px 60px rgba(0, 0, 0, 0.4);
            }

            .staticrypt-hr {
                margin: 24px 0;
                border: 0;
                border-top: 1px solid rgba(124, 58, 237, 0.15);
            }

            .staticrypt-title {
                font-size: 1.4em;
                font-weight: 700;
                color: #f0f0f5;
                margin-bottom: 4px;
            }

            .staticrypt-instructions {
                margin-bottom: 0;
            }

            .staticrypt-instructions p {
                color: #8080a0;
                font-size: 13px;
                line-height: 1.5;
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(124, 58, 237, 0.3);
                border-radius: 10px;
                box-sizing: border-box;
                font-size: 15px;
                font-family: 'Inter', sans-serif;
                outline: 0;
                padding: 14px 40px 14px 16px;
                width: 100%;
                color: #f0f0f5;
                transition: border-color 0.2s;
            }

            .staticrypt-form input[type="password"]:focus,
            input[type="text"]:focus {
                border-color: #7c3aed;
                box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
            }

            .staticrypt-form input[type="password"]::placeholder,
            input[type="text"]::placeholder {
                color: #5a5a7a;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                width: 100%;
                border: 0;
                margin: 0 0 16px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                box-sizing: content-box;
                height: 24px;
                width: 24px;
                opacity: 0.85;
                padding: 10px;
                position: absolute;
                right: 2px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s;
                -webkit-tap-highlight-color: transparent;
            }

            .staticrypt-toggle-password-visibility:hover,
            .staticrypt-toggle-password-visibility:active {
                opacity: 1;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-weight: 600;
                font-size: 13px;
                font-family: 'Inter', sans-serif;
                outline: 0;
                background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
                width: 100%;
                border: 0;
                padding: 14px;
                color: #ffffff;
                cursor: pointer;
                border-radius: 10px;
                transition: all 0.2s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
                box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
                transform: translateY(-1px);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                background: linear-gradient(135deg, #6d28d9 0%, #5b21b6 100%);
                transform: translateY(0);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                color: #8080a0;
                font-size: 13px;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 10px;
                accent-color: #7c3aed;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0a14;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid rgba(124, 58, 237, 0.3);
                border-right-color: #7c3aed;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

                    toggleIcon.title = templateToggleAltShow;
                }
            });

            // handle password form submission
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
